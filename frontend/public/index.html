<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        
        <!-- Primary Meta Tags -->
        <title>Kleoni Verse - Premium Fashion & Lifestyle Brand in India</title>
        <meta name="title" content="Kleoni Verse - Premium Fashion & Lifestyle Brand in India" />
        <meta name="description" content="Discover the latest fashion trends at Kleoni Verse. Shop premium clothing, accessories, and lifestyle products. Free shipping across India. 100% authentic quality." />
        <meta name="keywords" content="fashion, clothing, online shopping, premium wear, India, Kleoni Verse, ethnic wear, modern fashion, designer clothes, shopping" />
        <meta name="author" content="Kleoni Verse" />
        <meta name="robots" content="index, follow" />
        <link rel="canonical" href="https://kleoniverse.com/" />
        
        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://kleoniverse.com/" />
        <meta property="og:title" content="Kleoni Verse - Premium Fashion & Lifestyle Brand in India" />
        <meta property="og:description" content="Discover the latest fashion trends at Kleoni Verse. Shop premium clothing, accessories, and lifestyle products." />
        <meta property="og:image" content="https://kleoniverse.com/images/og-image.jpg" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:site_name" content="Kleoni Verse" />
        <meta property="og:locale" content="en_IN" />
        
        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:url" content="https://kleoniverse.com/" />
        <meta property="twitter:title" content="Kleoni Verse - Premium Fashion & Lifestyle Brand in India" />
        <meta property="twitter:description" content="Discover the latest fashion trends at Kleoni Verse. Shop premium clothing, accessories, and lifestyle products." />
        <meta property="twitter:image" content="https://kleoniverse.com/images/og-image.jpg" />
        
        <!-- Geo / Local SEO -->
        <meta name="geo.region" content="IN" />
        <meta name="geo.country" content="India" />
        <meta name="distribution" content="global" />
        
        <!-- Preconnect to external resources -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
        
        <!-- Favicon -->
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
        
        <!-- Manifest -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        
        <!-- Structured Data - Organization -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Organization",
            "name": "Kleoni Verse",
            "url": "https://kleoniverse.com",
            "logo": "https://kleoniverse.com/images/logo.png",
            "description": "Premium Fashion & Lifestyle Brand in India",
            "sameAs": [
                "https://www.instagram.com/kleoniverse",
                "https://www.facebook.com/kleoniverse",
                "https://twitter.com/kleoniverse"
            ],
            "contactPoint": {
                "@type": "ContactPoint",
                "telephone": "+91-XXXXXXXXXX",
                "contactType": "customer service",
                "availableLanguage": "English",
                "areaServed": "IN"
            },
            "address": {
                "@type": "PostalAddress",
                "addressCountry": "IN",
                "addressRegion": "India"
            }
        }
        </script>
        
        <!-- Structured Data - Website -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "Kleoni Verse",
            "url": "https://kleoniverse.com",
            "potentialAction": {
                "@type": "SearchAction",
                "target": "https://kleoniverse.com/search?q={search_term_string}",
                "query-input": "required name=search_term_string"
            }
        }
        </script>

        <script>
            // Capture JS errors but prevent them from blocking the page
            window.addEventListener("error", function(e) {
                if (e.error instanceof DOMException && 
                    e.error.name === "DataCloneError" && 
                    e.message && 
                    e.message.includes("PerformanceServerTiming")) {
                    e.stopImmediatePropagation();
                    e.preventDefault();
                }
            }, true);
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
